# conservative | balanced | large | adaptive-unrestricted
mode = "balanced"

[pool]
# Used as the starting target. The runtime may enforce a lower cap.
initial_concurrency = 3
# 0 means no plugin-defined concurrency cap in adaptive-unrestricted mode.
# Codex agents.max_threads and platform/resource limits still apply.
max_concurrency = 6
# 0 means no plugin-defined task-count ceiling.
max_pending_tasks = 0
max_retries = 1
job_timeout_seconds = 1800
success_window = 10
backoff_factor = 0.5
circuit_breaker_failures = 5

[writes]
max_write_concurrency = 1
allow_disjoint_parallel_writers = false

[collection]
persist_partial_results = true
return_raw_logs = false

[runner]
# CODEX_BIN overrides automatic selection. Otherwise the newest compatible CLI
# from the ChatGPT/Codex app bundle or PATH is selected.
backend = "codex-exec"
run_root = ".codex/orchestration-runs"
route_attestation = "requested-via-cli-arguments-not-runtime-attested"
